listen: "127.0.0.1:8081"
upstream: "https://api.deepseek.com/anthropic"
metric_prefix: "llm_interceptor."

log:
  request_body: false
  response_body: false

storage:
  type: sqlite
  sqlite:
    path: "~/.llm-interceptor/data.db"

state_store:
  type: memory

plugins:
  otel-exporter:
    enabled: false
    endpoint: "localhost:4318"
    headers: {}
    max_attr_len: 65535
  cost-tracker:
    enabled: true
  budget:
    max_cost_per_session: 0.50
  rate-limit:
    requests_per_minute: 5
  tool-policy:
    blocked_tools: ["computer", "bash"]
