services:
  llm-interceptor:
    build: .
    container_name: llm-interceptor
    ports:
      - "8080:8080"
    volumes:
      - llm-interceptor-data:/data
      - ./config.docker.yaml:/app/config.yaml
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

volumes:
  llm-interceptor-data:
